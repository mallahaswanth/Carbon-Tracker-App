<!DOCTYPE html>
<html lang="en">
<head>
  <title>CARBON TRACKER</title></head>
<body>
  <main>
      <div>
        <div class="brand-mark">C</div>
        <span>Carbon Tracker</span>
      </div>
    <section>
      <div>
        <h2>Sign in</h2>
        <p class="subcopy">Enter your email and password to access your account.</p>

        <form>
          <label>
            Email
            <input type="email" name="email" placeholder="name@example.com" autocomplete="email" required>
          </label>

          <label>
            Password
            <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          </label>

          <div class="meta">
            <label class="checkbox">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <button class="secondary" type="button"><a href="Forgot.html">Forgot password</a></button>
          </div>

          <button class="primary" type="submit">Sign in</button>

          <div class="divider">or</div>

          <button class="secondary" type="button"><a href="Signup.html">Create Account</a></button>
        </form>

        <p class="footer-note"><a href="Forgot.html">Need help? Contact support for account recovery.</a></p>
      </div>
    </section>
  </main>
</body>
</html>
