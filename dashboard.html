<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Dashboard</title>

</head>
<body>
    <div class="container">
        <a href="index.html" class="logout">Logout</a>
        <div class="card">
            <h2 id="welcomeMsg">Welcome</h2>
            <label>Car Miles (Passenger Vehicle):</label>
            <input id="carInput" min="0" placeholder="Enter miles..." type="number">
            
            <label>Bus Miles (Public Transit):</label>
            <input type="number" id="busInput" placeholder="Enter miles..." min="0">
            
            <label>Walk Miles (Zero Emission):</label>
            <input type="number" id="walkInput" placeholder="Enter miles..." min="0">
            
            <button onclick="calculateAndSave()">Calculate & Record</button>
        </div>

        <div class="card">
            <h3>Personal History</h3>
            <div id="historyList"></div>
        </div>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
